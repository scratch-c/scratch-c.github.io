<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>查看代码｜开发者工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 整蛊感：避免复制文字，显得更神秘 */
        }

        body {
            background: #0f1117;
            height: 100vh;
            overflow: hidden;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            position: relative;
        }

        /* 视频背景层 */
        .video-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 主界面：伪造的“代码查看器”风格，极客简洁 */
        .fake-code-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            background: #0a0c12;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(1px);
            transition: opacity 0.35s ease, visibility 0s 0.35s;
        }

        /* 类似代码编辑器卡片风格 */
        .code-card {
            background: rgba(18, 22, 32, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 2rem 2.2rem;
            border: 1px solid rgba(80, 120, 160, 0.4);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 90%;
            width: 480px;
            transition: transform 0.2s;
        }

        /* 仿代码标题 */
        .code-icon {
            font-size: 2.2rem;
            margin-bottom: 0.75rem;
            opacity: 0.8;
        }

        .code-card h3 {
            color: #b3d0ff;
            font-weight: 500;
            font-size: 1.55rem;
            letter-spacing: -0.3px;
            margin-bottom: 0.8rem;
            font-family: monospace;
        }

        .code-desc {
            font-size: 0.85rem;
            color: #8e9eae;
            margin-bottom: 1.8rem;
            border-left: 2px solid #2c4c6c;
            padding-left: 12px;
            text-align: left;
            font-family: monospace;
        }

        /* 主按钮：写着“点击查看完整代码” */
        .prank-btn {
            background: #1b2a3f;
            border: 1px solid #3e6a8c;
            color: #eaf4ff;
            font-size: 1.2rem;
            font-weight: 500;
            font-family: 'SF Mono', monospace;
            padding: 14px 28px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            width: 100%;
            letter-spacing: 1px;
        }

        .prank-btn:hover {
            background: #264a66;
            border-color: #5f8db0;
            transform: scale(1.01);
        }

        .prank-btn:active {
            transform: scale(0.97);
        }

        /* 隐藏遮罩 - 整蛊结束，显示真正的视频 */
        .fake-code-ui.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* 没有任何多余提示，没有任何悬浮条、额外文字 */
        .no-extra {
            display: none;
        }
        
        /* 完全符合 “只一次，不要一直锁定”  —— 点击后永久消失，视频只播放一次高音量且不会循环锁定 */
    </style>
</head>
<body>

<div class="video-layer">
    <video id="trickVideo" preload="auto" muted playsinline>
        <!-- 原视频素材地址（保证可用，高能预警素材） -->
        <source src="https://vdse.bdstatic.com//192d9a98d782d9c74c96f09db9378d93.mp4" type="video/mp4">
    </video>
</div>

<!-- 伪造的“代码查看”界面，整蛊入口 -->
<div class="fake-code-ui" id="fakeUi">
    <div class="code-card">
        <div class="code-icon">📁 &lt;/&gt;</div>
        <h3>view source code</h3>
        <div class="code-desc">
            /* 完整代码*/<br>
            // 点击下方按钮获取代码（应为不能直接贴代码，代码要分类）
        </div>
        <button class="prank-btn" id="triggerBtn">点击查看完整代码</button>
    </div>
</div>

<script>
    (function() {
        // 获取核心元素
        const overlay = document.getElementById('fakeUi');
        const btn = document.getElementById('triggerBtn');
        const video = document.getElementById('trickVideo');

        // 整蛊状态：仅仅触发一次，永远不会重复锁定、不会持续霸屏
        let triggered = false;

        // ----- 辅助：全屏模式 (只执行一次，不强制循环重新锁定)-----
        function requestFullscreenOnce(element) {
            if (!element) element = document.documentElement;
            const req = element.requestFullscreen ||
                        element.webkitRequestFullscreen ||
                        element.mozRequestFullScreen ||
                        element.msRequestFullscreen;
            if (req) {
                req.call(element).catch(err => {
                    // 静默，不干扰用户——整蛊无需提示，也不做强求
                    console.log("[整蛊安静模式]");
                });
            } else if (element.webkitEnterFullscreen && typeof element.webkitEnterFullscreen === 'function') {
                // 兼容 iOS 的 video 全屏
                element.webkitEnterFullscreen();
            }
        }

        // 一次性整蛊执行: 自动开满声音，仅播放一次，视频结束后不做循环锁定，并且只触发一次全屏
        function executePrank() {
            if (triggered) return;
            triggered = true;

            // 1. 关键: 取消静音，音量开到最大 (整蛊效果)
            video.muted = false;
            video.volume = 1.0;
            
            // 2. 确保视频只播放一次 (loop 先关闭，保证不重复整蛊)
            video.loop = false;    // 不循环！只播放一次，符合“只一次”
            
            // 3. 播放视频且用户手势触发后立即全屏尝试 (合规)
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // 视频开始播放后请求全屏 (这不会一直锁定，仅调用一次)
                    requestFullscreenOnce(video);
                }).catch(() => {
                    // 极少数播放失败，再次尝试播放
                    video.play().catch(e => console.log);
                    requestFullscreenOnce(video);
                });
            } else {
                video.play();
                requestFullscreenOnce(video);
            }
            
            // 4. 隐藏伪造的代码UI (整蛊结束界面消失，呈现视频)
            if (overlay) {
                overlay.classList.add('hide');
                setTimeout(() => {
                    if (overlay && overlay.parentNode) overlay.style.display = 'none';
                }, 400);
            }
            
            // 5. 关键点：当视频播放完毕后，不做任何额外操作（不会重新锁定全屏，不会再次弹出提示）
            //    并且结束之后没有任何循环要求，完全尊重用户，只是一个整蛊玩笑。
            video.addEventListener('ended', function onEnded() {
                // 视频自然结束 → 不进行任何强制操作，不清除页面内容也不弹回界面
                // 用户停留在视频最后一帧或者黑屏，但是不会有二次追踪，完全符合“不要一直锁定”
                // 为了体验更干净: 不做任何事情，这样用户觉得就像看完了整蛊视频。
                // 可选轻微优雅: 不做动作，完全释放控制权。
                // 注意: 不移除视频，不额外加提示，保持安静，整蛊完成。
                video.removeEventListener('ended', onEnded);
            });
            
            // 额外: 为了防止部分浏览器全屏退出后再次自动全屏，不做监听fullscreenchange的强制行为。
            // 完全遵循环: 只主动请求一次全屏，用户退出后不会再次锁定，且不会反复请求。
        }

        // 绑定按钮点击 —— 整蛊触发点 （完全符合: 按钮写着点击查看完整代码，点了之后自动开满声音，播放视频）
        if (btn) {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                executePrank();
            });
        }

        // 初始化视频配置：预加载但绝对不播放，保持安静状态，且loop初始为false（确保不循环）
        video.preload = 'auto';
        video.loop = false;          // 明确只播放一次
        video.muted = true;          // 起始静音（等待整蛊触发时取消）
        // 确保音量最大参数后续触发生效即可
        
        // 如果视频加载错误，完全不出任何提示，整蛊网站不能露馅
        video.addEventListener('error', () => {
            // 无任何提示，保证不破坏“代码查看”的伪装
            console.log('');
        });
        
        // 杜绝任何意外重新全屏/多重点击霸屏: 每次点击按钮后标志位保证只执行一次
        // 也要去除各种多余的esc监听，没有任何强制锁定逻辑，不会监听fullscreenchange重新请求。
        // 完全符合需求: “自动开满声音，只一次，不要一直锁定”
        
        // 另外：为防止视频结束后显示某些控件，不做额外干预，干净整洁。
        // 如果用户多次点击按钮，由于triggered标记，只会触发一次整蛊，绝对不会二次轰炸，更符合整蛊礼仪。
        
        // 轻微细节：为了伪装更像代码站，页面标题也改为开发工具风格
        document.title = "repository / main.ts";
    })();
</script>
</body>
</html>
